<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遠賀川水源地ポンプ室 メタバース保存プロジェクト（プロトタイプ）</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#0b0e12; height:100%; }
  * { box-sizing:border-box; }
  canvas { display:block; }
  #app-font-check { font-family: "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif; }

  #overlay {
    position:fixed; inset:0; z-index:20;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 50% 40%, rgba(30,36,44,0.92), rgba(8,10,13,0.97));
    font-family: "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    color:#eee; cursor:pointer; text-align:center;
  }
  #overlay .panel { max-width:560px; padding:32px; }
  #overlay h1 { font-size:20px; margin:0 0 6px; letter-spacing:0.02em; color:#f2e6c9; }
  #overlay h2 { font-size:13px; font-weight:normal; margin:0 0 24px; color:#9fb0bd; }
  #overlay .start { font-size:17px; padding:12px 28px; border:1px solid #cbb87a; border-radius:4px; display:inline-block; margin-bottom:22px; }
  #overlay .keys { font-size:12.5px; color:#aab6bf; line-height:1.9; }
  #overlay .keys b { color:#e7dcbb; }

  #crosshair {
    position:fixed; top:50%; left:50%; width:6px; height:6px; margin:-3px 0 0 -3px;
    border-radius:50%; background:rgba(255,255,255,0.7); box-shadow:0 0 2px rgba(0,0,0,0.6);
    z-index:10; display:none; pointer-events:none;
  }
  #hud {
    position:fixed; left:14px; bottom:12px; z-index:10; display:none;
    font-family: "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    font-size:12px; color:#dfe6ea; background:rgba(10,14,18,0.45);
    padding:8px 12px; border-radius:6px; line-height:1.7; pointer-events:none;
  }
  #hud b { color:#f2e6c9; }
  #title-badge {
    position:fixed; right:14px; top:12px; z-index:10; display:none;
    font-family: "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    font-size:12px; color:#dfe6ea; background:rgba(10,14,18,0.45);
    padding:6px 10px; border-radius:6px; pointer-events:none; text-align:right;
  }
</style>
</head>
<body>

<div id="overlay">
  <div class="panel">
    <h1>遠賀川水源地ポンプ室 メタバース保存プロジェクト</h1>
    <h2>プロトタイプ v0.1 — 建屋と周辺フィールドを試作中</h2>
    <div class="start">クリックしてスタート</div>
    <div class="keys">
      <b>W A S D</b> / 矢印キー：移動　　<b>Shift</b>：走る　　<b>Space</b>：ジャンプ<br>
      マウス移動：視点操作　　<b>ホイール</b>：ズーム（レンガの刻印を確認）<br>
      <b>M</b>：紹介動画の音声 ON/OFF　　<b>ESC</b>：視点操作の解除
    </div>
  </div>
</div>

<div id="crosshair"></div>
<div id="hud">レンガに近づき<b>ホイールでズーム</b>すると刻印が読めます。<br><b>Space</b>でジャンプ。正面の大型モニターで<b>紹介動画</b>が流れます（<b>M</b>で音声）。</div>
<div id="title-badge">遠賀川水源地ポンプ室<br>メタバース保存プロジェクト（試作）</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
<script src="app.js"></script>
</body>
</html>
